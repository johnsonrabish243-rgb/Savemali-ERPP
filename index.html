<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/SaveMali_Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaveMali — Gérez mieux, progressez plus</title>
    <meta name="description" content="SaveMali est une plateforme ERP tout-en-un pour gérer votre pharmacie, commerce, école et entreprise en RDC." />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('vite-ui-theme')
          var isDark =
            theme === 'dark' ||
            ((!theme || theme === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (isDark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
